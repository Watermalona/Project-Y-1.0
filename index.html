<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>毛毛無聊落樓梯 1.0</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #222;
            color: white;
            margin-top: 20px;
        }
        canvas {
            background-color: #000;
            border: 4px solid #fff;
            display: block;
            margin: 20px auto;
        }
        p { font-size: 18px; color: #ccc; }
        .hud-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 0;
        }
        h2 { margin: 10px 0; }
        #level-text { color: #FFD700; }
        #hp-text { color: #FF5252; }
    </style>
</head>
<body>

    <h1>>毛毛無聊落樓梯 1.0🐱</h1>
    <p>操控方法：用鍵盤 ⬅️ ➡️ 箭頭。⚠️ 避開紅色針刺，小心藍色傳送帶！</p>
    
    <div class="hud-container">
        <h2 id="level-text">LEVEL: 1</h2>
        <h2 id="hp-text">生命: 🐾🐾🐾</h2>
        <h2 id="score-text">層數: 0</h2>
    </div>
    
    <canvas id="gameCanvas" width="400" height="500"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // === 1. 玩家角色數值 ===
        let player = {
            x: 188,
            y: 50,
            width: 24,
            height: 24,
            vx: 0,
            vy: 0,
            speed: 5,
            gravity: 0.25,
            facing: "right"
        };

        // === 2. 遊戲核心設定 ===
        let platforms = [];
        let score = 0;
        let currentLevel = 1;
        let hp = 3;
        let gameOver = false;
        let animationFrameId = null;
        let invulnerableTimer = 0; // 受傷無敵時間計時器

        // 關卡參數設定
        const levelSettings = {
            1: { speed: 1.0, color: "#8DD7BF", spikeChance: 0.0, conveyorChance: 0.0 }, // Level 1: 全安全
            2: { speed: 1.3, color: "#2c94b9", spikeChance: 0.15, conveyorChance: 0.0 }, // Level 2: 開始有針刺
            3: { speed: 1.6, color: "#6C88C4", spikeChance: 0.20, conveyorChance: 0.15 }, // Level 3: 加入傳送帶
            4: { speed: 1.9, color: "#FFBF65", spikeChance: 0.25, conveyorChance: 0.25 },
            5: { speed: 2.2, color: "#E77577", spikeChance: 0.25, conveyorChance: 0.35 }  // Level 5: 極快
        };

        // === 3. 鍵盤監聽 ===
        let keys = { Left: false, Right: false };
        window.addEventListener("keydown", e => {
            if (e.key === "ArrowLeft" || e.key === "Left") {
                keys.Left = true;
                player.facing = "left";
            }
            if (e.key === "ArrowRight" || e.key === "Right") {
                keys.Right = true;
                player.facing = "right";
            }
        });
        window.addEventListener("keyup", e => {
            if (e.key === "ArrowLeft" || e.key === "Left") keys.Left = false;
            if (e.key === "ArrowRight" || e.key === "Right") keys.Right = false;
        });

        // === 4. 樓梯生成邏輯 ===
        function initPlatforms() {
            platforms = [];
            // 第一塊必定係普通安全樓梯
            platforms.push({ x: 150, y: 150, width: 100, height: 15, type: "normal" });
            
            for (let i = 1; i < 6; i++) {
                generatePlatform(i * 85 + 150);
            }
        }

        function generatePlatform(yPosition) {
            let width = 80;
            let x = Math.random() * (canvas.width - width);
            
            let current = levelSettings[currentLevel] || levelSettings;
            let rand = Math.random();
            let type = "normal";

            if (rand < current.spikeChance) {
                type = "spike";
            } else if (rand < current.spikeChance + current.conveyorChance) {
                type = Math.random() < 0.5 ? "conveyorLeft" : "conveyorRight";
            }

            platforms.push({ x: x, y: yPosition, width: width, height: 15, type: type });
        }

        // === 5. 遊戲主引擎 ===
        function update() {
            if (gameOver) return;

            // 處理無敵時間
            if (invulnerableTimer > 0) {
                invulnerableTimer--;
            }

            // 鍵盤移動反應
            if (keys.Left) {
                player.vx = -player.speed;
            } else if (keys.Right) {
                player.vx = player.speed;
            } else {
                player.vx = 0;
            }

            player.vy += player.gravity;
            player.x += player.vx;
            player.y += player.vy;

            // 左右邊界碰撞檢查
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

            let speedSetting = levelSettings[currentLevel] ? levelSettings[currentLevel].speed : 1.0;

            // 逐條樓梯檢查碰撞
            platforms.forEach((plat, index) => {
                plat.y -= speedSetting;

                let insideX = player.x + player.width > plat.x && player.x < plat.x + plat.width;
                
                if (insideX) {
                    if (player.y + player.height >= plat.y && player.y + player.height - player.vy <= plat.y + 8) {
                        
                        if (plat.type === "spike") {
                            takeDamage();
                            player.vy = -4; // 彈開
                        } else {
                            player.y = plat.y - player.height;
                            player.vy = -speedSetting; 

                            // 傳送帶推力
                            if (plat.type === "conveyorLeft") {
                                player.x -= 2.0;
                            } else if (plat.type === "conveyorRight") {
                                player.x += 2.0;
                            }
                        }
                    }
                }

                // 移出頂部重新生成
                if (plat.y + plat.height < 0) {
                    platforms.splice(index, 1);
                    generatePlatform(canvas.height);
                    score++;
                    checkLevelUp();
                    document.getElementById("score-text").innerText = "層數: " + score;
                }
            });

            // === 6. 死亡與受傷判斷 ===
            // 頂部紅線夾到
            if (player.y <= 10) {
                player.y = 10;
                takeDamage();
            }
            
            // 跌落深淵
            if (player.y > canvas.height) {
                hp = 0;
                updateHPDisplay();
                endGame(`貓貓跌落深淵跌死咗喇！😭`);
                return;
            }

            // 生命值扣晒就輸
            if (hp <= 0) {
                endGame(`貓貓已經耗盡所有生命值喇！😭`);
                return;
            }

            draw();
            animationFrameId = requestAnimationFrame(update);
        }

        // 扣血邏輯
        function takeDamage() {
            if (invulnerableTimer === 0) {
                hp--;
                invulnerableTimer = 60; // 1秒無敵防止秒殺
                updateHPDisplay();
            }
        }

        // 更新生命值 UI
        function updateHPDisplay() {
            let hearts = "";
            for (let i = 0; i < hp; i++) {
                hearts += "🐾";
            }
            if (hearts === "") hearts = "❌ 已陣亡";
            document.getElementById("hp-text").innerText = "生命: " + hearts;
        }

        // 自動升級計算
        function checkLevelUp() {
            let nextLevel = Math.floor(score / 10) + 1;
            if (nextLevel > 5) nextLevel = 5;
            if (nextLevel !== currentLevel) {
                currentLevel = nextLevel;
                document.getElementById("level-text").innerText = "LEVEL: " + currentLevel;
            }
        }

        // === 7. 畫面繪製功能 ===
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 天花板紅線
            ctx.fillStyle = "#FF5C77";
            ctx.fillRect(0, 0, canvas.width, 10);

            // ---- 畫貓貓 ----
            if (invulnerableTimer % 8 < 4) { 
                let centerX = player.x + player.width / 2;
                let centerY = player.y + player.height / 2;
                let radius = player.width / 2;

                // 貓耳
                ctx.fillStyle = "#FFCA28"; 
                ctx.beginPath();
                ctx.moveTo(centerX - radius, centerY - radius + 5);
                ctx.lineTo(centerX - radius - 2, centerY - radius - 6);
                ctx.lineTo(centerX - 2, centerY - radius + 2);
                ctx.fill();

                ctx.beginPath();
                ctx.moveTo(centerX + radius, centerY - radius + 5);
                ctx.lineTo(centerX + radius + 2, centerY - radius - 6);
                ctx.lineTo(centerX + 2, centerY - radius + 2);
                ctx.fill();

                // 貓面
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                ctx.fill();

                // 眼睛
                ctx.fillStyle = "#000000";
                let eyeOffsetX = player.facing === "left" ? -4 : 2; 
                
                ctx.beginPath();
                ctx.arc(centerX - 4 + eyeOffsetX, centerY - 2, 2, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.beginPath();
                ctx.arc(centerX + 4 + eyeOffsetX, centerY - 2, 2, 0, Math.PI * 2);
                ctx.fill();

                // 貓鼻
                ctx.fillStyle = "#FF8A80";
                ctx.beginPath();
                ctx.arc(centerX + (player.facing === "left" ? -2 : 1), centerY + 2, 1.5, 0, Math.PI * 2);
                ctx.fill();
            }

            // ---- 畫各種樓梯 ----
            let currentColors = levelSettings[currentLevel] || levelSettings;
            
            platforms.forEach(plat => {
                if (plat.type === "spike") {
                    // 1. 紅色針刺樓梯
                    ctx.fillStyle = "#FF3333";
                    ctx.fillRect(plat.x, plat.y + 5, plat.width, plat.height - 5);
                    
                    let spikeWidth = 8;
                    for (let i = plat.x; i < plat.x + plat.width; i += spikeWidth) {
                        ctx.beginPath();
                        ctx.moveTo(i, plat.y + 5);
                        ctx.lineTo(i + spikeWidth / 2, plat.y - 4);
                        ctx.lineTo(i + spikeWidth, plat.y + 5);
                        ctx.fill();
                    }
                } 
                else if (plat.type === "conveyorLeft" || plat.type === "conveyorRight") {
                    // 2. 亮藍色傳送帶樓梯
                    ctx.fillStyle = "#00E5FF";
                    ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
                    
                    ctx.strokeStyle = "#FFFFFF";
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    if (plat.type === "conveyorLeft") {
                        ctx.moveTo(plat.x + 20, plat.y + 7); 
                        ctx.lineTo(plat.x + 10, plat.y + 7);
                        ctx.lineTo(plat.x + 15, plat.y + 3); 
                        ctx.moveTo(plat.x + 10, plat.y + 7); 
                        ctx.lineTo(plat.x + 15, plat.y + 11);
                    } else {
                        ctx.moveTo(plat.x + 60, plat.y + 7); 
                        ctx.lineTo(plat.x + 70, plat.y + 7);
                        ctx.lineTo(plat.x + 65, plat.y + 3); 
                        ctx.moveTo(plat.x + 70, plat.y + 7); 
                        ctx.lineTo(plat.x + 65, plat.y + 11);
                    }
                    ctx.stroke();
                } 
                else {
                    // 3. 普通安全樓梯
                    ctx.fillStyle = currentColors.color;
                    ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
                }
            });
        }

        // === 8. 遊戲重開 ===
        function endGame(msg) {
            gameOver = true;
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }
            setTimeout(() => {
                alert(msg + " 最終得分: " + score + " 層");
                startGame();
            }, 10);
        }

        function startGame() {
            player.x = 188;
            player.y = 50;
            player.vy = 0;
            score = 0;
            currentLevel = 1;
            hp = 3;
            player.facing = "right";
            invulnerableTimer = 0;
            
            document.getElementById("score-text").innerText = "層數: 0";
            document.getElementById("level-text").innerText = "LEVEL: 1";
            updateHPDisplay();
            
            keys.Left = false;
            keys.Right = false;
            
            gameOver = false;
            initPlatforms();
            update();
        }

        // 啟動遊戲
        startGame();
    </script>

</body>
</html>
